<div class="dashboard">
  <div class="dashboard-grid single-chart">
    <div class="chart-panel">
      <div class="chart-card">
        <div class="chart-title">Project type breakdown</div>

        <div class="chart-visual">
          <div class="pie-chart" [style.background]="pieGradient"></div>
          <div class="chart-center">{{ totalProjectCount }} Projects</div>
        </div>

        <div class="chart-legend">
          <div *ngFor="let item of projectBreakdown" class="legend-item">
            <div class="legend-badge" [style.background]="item.color"></div>
            <div>
              <strong>{{ item.label }}</strong>
              <div class="legend-value">{{ item.value }}%</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
