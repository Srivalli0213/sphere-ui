<div class="dashboard">

  <div class="stats-box">
    <div class="stats-panel row-top">
      <div *ngFor="let item of topKpis" class="stat-card large">
        <div class="label">{{ item.label }}</div>
        <div class="value">{{ item.value }}</div>
      </div>
    </div>

    <div class="stats-panel row-bottom">
      <div *ngFor="let item of bottomKpis" class="stat-card">
        <div class="label">{{ item.label }}</div>
        <div class="value">{{ item.value }}</div>
      </div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="chart-panel">
      <div class="chart-card">
        <div class="chart-title">Project type breakdown</div>

        <div class="chart-body">
          <div class="chart-visual">
            <div class="donut-chart" [style.background]="pieGradient"></div>
            <div class="chart-center">{{ totalProjectCount }} Projects</div>
          </div>

          <div class="chart-legend">
            <div *ngFor="let item of projectBreakdown" class="legend-item">
              <span class="legend-badge" [style.background]="item.color"></span>
              <div class="legend-details">
                <div class="legend-header">
                  <span class="legend-label">{{ item.label }}</span>
                  <span class="legend-count">{{ item.value }} projects</span>
                </div>
                <div class="legend-progress">
                  <div class="legend-bar">
                    <span
                      class="legend-bar-fill"
                      [style.width.%]="getBreakdownPercent(item.value)"
                      [style.backgroundColor]="item.color"
                    ></span>
                  </div>
                  <span class="legend-percent">{{ getBreakdownPercent(item.value) | number:'1.1-1' }}%</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
