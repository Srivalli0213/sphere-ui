<app-sidebar (menuChange)="onMenuChange($event)"></app-sidebar>

<div class="app-container">
  <div class="page-layout">
    <div class="main-content">
      <!-- Dashboard View -->
      <div *ngIf="activeMenu === 'dashboard'" class="content-panel">
       <div class="dashboard-header">
         <h2 class="section-title">Dashboard</h2>
       </div>

       <div class="stats-box">
         <div class="side-stats">
           <div class="side-stat large">
             <div class="label">Completed Projects</div>
             <div class="value">82</div>
           </div>

           <div class="side-stat large">
             <div class="label">Pending Projects</div>
             <div class="value">23</div>
           </div>

           <div class="side-stat large">
             <div class="label">Total Projects</div>
             <div class="value">124</div>
           </div>
         </div>

         <div class="side-bottom-stats">
           <div class="side-stat">
             <div class="label">Trending Projects</div>
             <div class="value">9</div>
           </div>

           <div class="side-stat">
             <div class="label">Upcoming Projects</div>
             <div class="value">10</div>
           </div>
         </div>
       </div>

       <app-dashboard></app-dashboard>
      </div>

      <!-- Projects View -->
      <div *ngIf="activeMenu === 'projects'" class="content-panel">
       <div class="placeholder-content">
         <h2>Projects</h2>
         <p>Manage and track your projects here</p>
       </div>
      </div>

      <!-- Analytics View -->
      <div *ngIf="activeMenu === 'analytics'" class="content-panel">
       <div class="placeholder-content">
         <h2>Analytics</h2>
         <p>View detailed analytics and insights</p>
       </div>
      </div>

      <!-- Reports View -->
      <div *ngIf="activeMenu === 'reports'" class="content-panel">
       <div class="placeholder-content">
         <h2>Reports</h2>
         <p>Generate and view reports</p>
       </div>
      </div>

      <!-- Settings View -->
      <div *ngIf="activeMenu === 'settings'" class="content-panel">
       <div class="placeholder-content">
         <h2>Settings</h2>
         <p>Configure your application settings</p>
       </div>
      </div>
    </div>
  </div>
</div>
